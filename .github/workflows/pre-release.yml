name: Building

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - no-update-version
          - patch
          - minor
          - major
          - prerelease
      publish_to_npm:
        description: "Publish openteams-npx package to npm"
        required: true
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref_name }} # allow concurrent prerelease from different branches
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  NODE_VERSION: 22
  PNPM_VERSION: 10.13.1
  RUST_TOOLCHAIN: nightly-2025-12-04
  CARGO_XWIN_VERSION: 0.20.2
  ENABLE_MACOS_DMG: "false"

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.version.outputs.new_tag }}
      new_version: ${{ steps.version.outputs.new_version }}
      branch_suffix: ${{ steps.branch.outputs.suffix }}
    steps:
      - name: Cache cargo-edit
        uses: actions/cache@v5
        id: cache-cargo-edit
        with:
          path: ~/.cargo/bin/cargo-set-version
          key: cargo-edit-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}

      - name: Install cargo-edit
        if: steps.cache-cargo-edit.outputs.cache-hit != 'true'
        run: cargo install cargo-edit

      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: setup node
        uses: ./.github/actions/setup-node

      - name: Setup SSH Agent for private dependencies
        id: ssh-setup
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Generate branch suffix
        id: branch
        run: |
          branch_name="${{ github.ref_name }}"
          # Get last 6 characters of branch name, remove all special chars (including dashes)
          suffix=$(echo "$branch_name" | tail -c 7 | sed 's/[^a-zA-Z0-9]//g' | tr '[:upper:]' '[:lower:]')
          echo "Branch: $branch_name"
          echo "Suffix: $suffix"
          echo "suffix=$suffix" >> $GITHUB_OUTPUT

      - name: Determine and update versions
        id: version
        run: |
          # Get the latest version from npm registry
          latest_npm_version=$(npm view openteams version 2>/dev/null || echo "0.0.0")
          echo "Latest npm version: $latest_npm_version"

          # Get current repo version
          current_repo_version=$(node -p "require('./package.json').version")
          echo "Current repo version: $current_repo_version"

          # Use the higher major.minor.patch from npm/repo as the release base.
          # This avoids semver ordering edge cases like:
          #   0.2.3-main.0 > 0.2.3-30.0
          release_base_version=$(node -e "
            const toCore = (version) => {
              const [core] = String(version).split('-');
              const [major, minor, patch] = core
                .split('.')
                .map((value) => Number.parseInt(value, 10) || 0);
              return [major, minor, patch];
            };
            const toString = ([major, minor, patch]) => major + '.' + minor + '.' + patch;
            const npmCore = toCore('$latest_npm_version');
            const repoCore = toCore('$current_repo_version');
            for (let i = 0; i < 3; i++) {
              if (npmCore[i] > repoCore[i]) { console.log(toString(npmCore)); process.exit(); }
              if (npmCore[i] < repoCore[i]) { console.log(toString(repoCore)); process.exit(); }
            }
            console.log(toString(repoCore));
          ")
          echo "Release base version for bump: $release_base_version"

          timestamp=$(date +%Y%m%d%H%M%S)

          if [[ "${{ github.event.inputs.version_type }}" == "no-update-version" ]]; then
            # Rebuild from the current checked-in version without incrementing it.
            new_version="$current_repo_version"
            new_tag="v${new_version}-${timestamp}"
          elif [[ "${{ github.event.inputs.version_type }}" == "prerelease" ]]; then
            # For prerelease, align to stable release_base_version and keep
            # the same major.minor.patch without bumping.
            # Then append a numeric prerelease identifier.
            # MSI requires a numeric prerelease identifier (<= 65535).
            npm version $release_base_version --no-git-tag-version --allow-same-version

            msi_prerelease_id="${GITHUB_RUN_NUMBER:-1}"
            if ! [[ "$msi_prerelease_id" =~ ^[0-9]+$ ]]; then
              msi_prerelease_id=1
            fi
            msi_prerelease_id=$(( (msi_prerelease_id - 1) % 65535 + 1 ))
            echo "MSI-compatible prerelease id: $msi_prerelease_id"

            new_version="${release_base_version}-${msi_prerelease_id}"
            npm version "$new_version" --no-git-tag-version --allow-same-version
            new_tag="v${new_version}.${timestamp}"
          else
            # For regular releases, use release_base_version and bump it
            npm version $release_base_version --no-git-tag-version --allow-same-version
            npm version ${{ github.event.inputs.version_type }} --no-git-tag-version

            new_version=$(node -p "require('./package.json').version")
            new_tag="v${new_version}-${timestamp}"
          fi

          # Desktop installers require a stable x.y.z version when the package
          # version carries a prerelease suffix.
          desktop_version="$new_version"
          if [[ "$new_version" == *-* ]]; then
            desktop_version="${new_version%%-*}"
          fi

          # Update openteams-npx package.json to match
          cd npx/openteams-npx
          npm version $new_version --no-git-tag-version --allow-same-version
          cd ../..

          # Update openteams-web-npx package.json to match
          cd npx/openteams-web-npx
          npm version $new_version --no-git-tag-version --allow-same-version
          # Update dependency version to match
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.dependencies['@openteams-lab/openteams-web'] = '^' + '$new_version';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          cd ../..

          # Update frontend package.json to match
          cd frontend
          npm version $new_version --no-git-tag-version --allow-same-version
          cd ..

          # Keep desktop app version MSI-compatible when using a prerelease version.
          cargo set-version --manifest-path src-tauri/Cargo.toml "$desktop_version"
          DESKTOP_VERSION="$desktop_version" node -e '
            const fs = require("fs");
            const path = "src-tauri/tauri.conf.json";
            const conf = JSON.parse(fs.readFileSync(path, "utf8"));
            conf.package = conf.package || {};
            conf.package.version = process.env.DESKTOP_VERSION;
            fs.writeFileSync(path, JSON.stringify(conf, null, 2) + "\n");
          '

          cargo set-version --workspace "$new_version"

          echo "New version: $new_version"
          echo "Desktop app version: $desktop_version"
          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT

      - name: Stop SSH agent
        if: ${{ steps.ssh-setup.outcome == 'success' }}
        run: ssh-agent -k

      - name: Commit changes and create tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json pnpm-lock.yaml npx/openteams-npx/package.json npx/openteams-web-npx/package.json frontend/package.json src-tauri/tauri.conf.json Cargo.lock
          git add $(find . -name Cargo.toml)
          if git diff --cached --quiet; then
            echo "No version files changed; tagging current commit."
          else
            git commit -m "chore: prepare build for ${{ steps.version.outputs.new_version }}"
            git push
          fi
          git tag -a ${{ steps.version.outputs.new_tag }} -m "Release ${{ steps.version.outputs.new_tag }}"
          git push --tags

  build-frontend:
    needs: bump-version
    runs-on: ubuntu-latest
    env:
      VITE_PUBLIC_REACT_VIRTUOSO_LICENSE_KEY: ${{ secrets.PUBLIC_REACT_VIRTUOSO_LICENSE_KEY }}
      VITE_VK_SHARED_API_BASE: ${{ secrets.VK_SHARED_API_BASE }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        run: pnpm install

      - name: Lint frontend
        run: cd frontend && npm run lint

      - name: Type check frontend
        run: cd frontend && npx tsc --noEmit

      - name: Validate frontend PostHog build secrets
        shell: bash
        env:
          VITE_POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          VITE_POSTHOG_API_ENDPOINT: ${{ secrets.POSTHOG_API_ENDPOINT }}
        run: |
          set -euo pipefail
          for key in VITE_POSTHOG_API_KEY VITE_POSTHOG_API_ENDPOINT; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing GitHub Secret-backed frontend build env: $key"
              exit 1
            fi
          done

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VITE_POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          VITE_POSTHOG_API_ENDPOINT: ${{ secrets.POSTHOG_API_ENDPOINT }}

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  build-backend:
    needs: [bump-version, build-frontend]
    runs-on: ${{ matrix.os }}
    strategy:
      # Platform matrix - keep target/name in sync with package-cli job
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: linux-x64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: linux-arm64
          - target: x86_64-pc-windows-msvc
            os: ubuntu-latest
            name: windows-x64
          - target: x86_64-apple-darwin
            os: macos-14
            name: macos-x64
          - target: aarch64-apple-darwin
            os: macos-14
            name: macos-arm64
    env:
      CARGO_INCREMENTAL: "0"
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      SCCACHE_CACHE_SIZE: "10G"
      CARGO_HOME: ${{ github.workspace }}/.cargo
      RUSTUP_HOME: ${{ github.workspace }}/.rustup
      XWIN_CACHE_DIR: ${{ github.workspace }}/.xwin-cache
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Disable sccache on macOS
        if: runner.os == 'macOS'
        run: |
          echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=" >> "$GITHUB_ENV"
          echo "SCCACHE_CACHE_SIZE=" >> "$GITHUB_ENV"

      - name: Setup sccache
        if: runner.os != 'macOS'
        uses: BloopAI/sccache-action@main

      - name: Cache Rust toolchain
        uses: actions/cache@v5
        with:
          path: .rustup/toolchains
          key: rust-toolchain-${{ runner.os }}-${{ matrix.target }}-${{ env.RUST_TOOLCHAIN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y clang libclang-dev lld llvm nasm cmake ninja-build

          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            DEBIAN_FRONTEND=noninteractive sudo apt-get install -y clang-19 clang-tools-19 llvm-19 lld-19
            echo "/usr/lib/llvm-19/bin" >> $GITHUB_PATH
          fi

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            .cargo/registry/cache
            .cargo/registry/index
            .cargo/git/db
            .cargo/bin
            .cargo/.crates.toml
            .cargo/.crates2.json
          key: cargo-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ matrix.target }}-

      - name: Install Zig
        if: runner.os == 'Linux' && !contains(matrix.target, 'windows')
        shell: bash
        run: |
          set -euo pipefail
          zig_version="0.15.2"
          zig_dir="$RUNNER_TEMP/zig"
          mkdir -p "$zig_dir"
          curl -fsSL "https://ziglang.org/download/${zig_version}/zig-x86_64-linux-${zig_version}.tar.xz" -o "$zig_dir/zig.tar.xz"
          tar -xJf "$zig_dir/zig.tar.xz" -C "$zig_dir" --strip-components=1
          echo "$zig_dir" >> "$GITHUB_PATH"
          "$zig_dir/zig" version

      - name: Install cargo zigbuild
        if: runner.os == 'Linux' && !contains(matrix.target, 'windows')
        run: cargo install --locked cargo-zigbuild --version 0.20.1

      - name: Install cargo xwin
        if: runner.os == 'Linux' && contains(matrix.target, 'windows')
        run: cargo install --locked cargo-xwin --version ${{ env.CARGO_XWIN_VERSION }}

      - name: Cache xwin downloads
        if: runner.os == 'Linux' && contains(matrix.target, 'windows')
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.xwin-cache
          key: xwin-${{ runner.os }}-${{ matrix.target }}-cargo-xwin-${{ env.CARGO_XWIN_VERSION }}

      - name: Cache target
        uses: actions/cache@v5
        with:
          path: target
          key: target-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ matrix.target }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            target-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ matrix.target }}-${{ github.ref_name }}-
            target-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ matrix.target }}-

      - name: Setup cargo-sweep
        shell: bash
        run: |
          cargo install --locked cargo-sweep --version 0.8.0

      - name: Download frontend artifact
        uses: actions/download-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Validate backend PostHog build secrets
        shell: bash
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_API_ENDPOINT: ${{ secrets.POSTHOG_API_ENDPOINT }}
        run: |
          set -euo pipefail
          for key in POSTHOG_API_KEY POSTHOG_API_ENDPOINT; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing GitHub Secret-backed backend build env: $key"
              exit 1
            fi
          done

      - name: Build backend (Linux)
        if: runner.os == 'Linux' && !contains(matrix.target, 'windows')
        run: |
          cargo zigbuild --release --target ${{ matrix.target }} -p server -p review --bin server --bin review
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_API_ENDPOINT: ${{ secrets.POSTHOG_API_ENDPOINT }}
          VK_SHARED_API_BASE: ${{ secrets.VK_SHARED_API_BASE }}

      - name: Build backend (macOS)
        if: runner.os == 'macOS'
        run: |
          if [[ "${{ matrix.target }}" == "x86_64-apple-darwin" ]]; then
            export MACOSX_DEPLOYMENT_TARGET=10.12
          elif [[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
            export MACOSX_DEPLOYMENT_TARGET=11.0
          fi
          cargo build --release --target ${{ matrix.target }} -p server -p review --bin server --bin review
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_API_ENDPOINT: ${{ secrets.POSTHOG_API_ENDPOINT }}
          VK_SHARED_API_BASE: ${{ secrets.VK_SHARED_API_BASE }}

      - name: Build backend (Windows)
        if: runner.os == 'Linux' && contains(matrix.target, 'windows')
        run: |
          # Keep host-compiled C code on GNU clang.
          # Without this, cargo-xwin's clang-cl can leak into host builds
          # (e.g. aws-lc-sys for x86_64-unknown-linux-gnu) and fail on GCC-style flags.
          export HOST_CC=clang
          export HOST_CXX=clang++
          export TARGET_CC_x86_64_unknown_linux_gnu=clang
          export TARGET_CXX_x86_64_unknown_linux_gnu=clang++
          export AWS_LC_SYS_TARGET_CC_x86_64_unknown_linux_gnu=clang
          export AWS_LC_SYS_TARGET_CXX_x86_64_unknown_linux_gnu=clang++
          export CC_x86_64_unknown_linux_gnu=clang
          export CXX_x86_64_unknown_linux_gnu=clang++
          cargo xwin build --cross-compiler clang-cl --release --target ${{ matrix.target }} -p server -p review --bin server --bin review
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_API_ENDPOINT: ${{ secrets.POSTHOG_API_ENDPOINT }}
          VK_SHARED_API_BASE: ${{ secrets.VK_SHARED_API_BASE }}
          # Avoid aws-lc-sys CMake failures when Rust's `release` profile includes debug info.
          # Without this, cmake-rs selects RelWithDebInfo and CMake fails when ASM is enabled.
          CARGO_PROFILE_RELEASE_DEBUG: 0

      - name: Setup Sentry CLI
        uses: matbour/setup-sentry-cli@v2
        with:
          token: ${{ secrets.SENTRY_AUTH_TOKEN }}
          organization: ${{ secrets.SENTRY_ORG }}
          project: ${{ secrets.SENTRY_PROJECT }}
          version: 2.21.2

      - name: Prepare binaries (non-macOS)
        if: runner.os != 'macOS'
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.name }}" == *"windows"* ]]; then
            cp target/${{ matrix.target }}/release/server.exe dist/openteams-${{ matrix.name }}.exe
            cp target/${{ matrix.target }}/release/review.exe dist/openteams-review-${{ matrix.name }}.exe
          else
            cp target/${{ matrix.target }}/release/server dist/openteams-${{ matrix.name }}
            cp target/${{ matrix.target }}/release/review dist/openteams-review-${{ matrix.name }}
          fi

      # Code signing for macOS only
      - name: Detect macOS backend signing configuration
        id: macos_backend_signing
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APP_STORE_API_KEY: ${{ secrets.APP_STORE_API_KEY }}
        run: |
          set -euo pipefail
          sign_enabled=true
          notarize_enabled=true

          for key in APPLE_CERTIFICATE_P12_BASE64 APPLE_CERTIFICATE_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "::warning::Missing secret: $key"
              sign_enabled=false
            fi
          done

          if [ "$sign_enabled" != "true" ]; then
            notarize_enabled=false
            echo "::notice::macOS backend signing disabled. Will package unsigned binaries."
          fi

          if [ -z "${APP_STORE_API_KEY}" ]; then
            notarize_enabled=false
            if [ "$sign_enabled" = "true" ]; then
              echo "::notice::APP_STORE_API_KEY missing. Skipping notarization."
            fi
          fi

          echo "sign_enabled=$sign_enabled" >> "$GITHUB_OUTPUT"
          echo "notarize_enabled=$notarize_enabled" >> "$GITHUB_OUTPUT"

      - name: Prepare Apple certificate (macOS)
        if: runner.os == 'macOS' && steps.macos_backend_signing.outputs.sign_enabled == 'true'
        run: |
          echo "${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}" | base64 --decode > certificate.p12

      - name: Write API Key to file
        if: runner.os == 'macOS' && steps.macos_backend_signing.outputs.notarize_enabled == 'true'
        env:
          API_KEY: ${{ secrets.APP_STORE_API_KEY }}
        run: echo $API_KEY > app_store_key.json

      - name: Sign main binary (macOS)
        if: runner.os == 'macOS' && steps.macos_backend_signing.outputs.sign_enabled == 'true'
        uses: BloopAI/apple-code-sign-action@v1
        with:
          input_path: target/${{ matrix.target }}/release/server
          output_path: openteams
          p12_file: certificate.p12
          p12_password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          sign: true
          sign_args: "--code-signature-flags=runtime"

      - name: Package main binary (macOS)
        if: runner.os == 'macOS' && steps.macos_backend_signing.outputs.sign_enabled == 'true'
        run: zip openteams.zip openteams

      - name: Sign Review binary (macOS)
        if: runner.os == 'macOS' && steps.macos_backend_signing.outputs.sign_enabled == 'true'
        uses: BloopAI/apple-code-sign-action@v1
        with:
          input_path: target/${{ matrix.target }}/release/review
          output_path: openteams-review
          p12_file: certificate.p12
          p12_password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          sign: true
          sign_args: "--code-signature-flags=runtime"

      - name: Package Review binary (macOS)
        if: runner.os == 'macOS' && steps.macos_backend_signing.outputs.sign_enabled == 'true'
        run: zip openteams-review.zip openteams-review

      - name: Package unsigned binaries (macOS)
        if: runner.os == 'macOS' && steps.macos_backend_signing.outputs.sign_enabled != 'true'
        run: |
          cp target/${{ matrix.target }}/release/server openteams
          cp target/${{ matrix.target }}/release/review openteams-review
          chmod +x openteams openteams-review
          zip openteams.zip openteams
          zip openteams-review.zip openteams-review

      - name: Notarize signed binaries (macOS)
        if: runner.os == 'macOS' && steps.macos_backend_signing.outputs.notarize_enabled == 'true'
        uses: BloopAI/apple-code-sign-action@main
        continue-on-error: true
        with:
          input_path: |
            openteams.zip
            openteams-review.zip
          sign: false
          notarize: true
          app_store_connect_api_key_json_file: app_store_key.json

      - name: Prepare macOS binaries
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp openteams.zip dist/openteams-${{ matrix.name }}.zip
          cp openteams-review.zip dist/openteams-review-${{ matrix.name }}.zip

      - name: Clean up certificates (macOS)
        if: runner.os == 'macOS'
        run: |
          rm -f certificate.p12
          rm -f app_store_key.json
          rm -rf private_keys/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: backend-binary-${{ matrix.name }}
          path: dist/
          retention-days: 1

      - name: Sweep Cargo target cache
        shell: bash
        run: |
          cargo sweep --maxsize 10GB
          cargo sweep --time 30


  package-cli:
    needs: [bump-version, build-frontend, build-backend]
    runs-on: ubuntu-latest
    strategy:
      # NOTE: This matrix must be kept in sync with build-backend job above
      # GitHub Actions doesn't support YAML anchors, so duplication is unavoidable
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            name: linux-x64
            binary: openteams
            review_binary: openteams-review
            cli_target: linux-x64
            cli_build_output: openteams-cli-linux-x64
            cli_binary: openteams-cli
          - target: x86_64-pc-windows-msvc
            name: windows-x64
            binary: openteams.exe
            review_binary: openteams-review.exe
            cli_target: windows-x64
            cli_build_output: openteams-cli-windows-x64.exe
            cli_binary: openteams-cli.exe
          - target: x86_64-apple-darwin
            name: macos-x64
            binary: openteams
            review_binary: openteams-review
            cli_target: darwin-x64
            cli_build_output: openteams-cli-darwin-x64
            cli_binary: openteams-cli
          - target: aarch64-apple-darwin
            name: macos-arm64
            binary: openteams
            review_binary: openteams-review
            cli_target: darwin-arm64
            cli_build_output: openteams-cli-darwin-arm64
            cli_binary: openteams-cli
          - target: aarch64-unknown-linux-musl
            name: linux-arm64
            binary: openteams
            review_binary: openteams-review
            cli_target: linux-arm64
            cli_build_output: openteams-cli-linux-arm64
            cli_binary: openteams-cli
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Download frontend artifact
        uses: actions/download-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Download backend binary artifact
        uses: actions/download-artifact@v7
        with:
          name: backend-binary-${{ matrix.name }}
          path: dist/

      - name: List downloaded artifacts
        run: |
          echo "Downloaded backend binaries:"
          find dist/

      - name: Setup Bun for CLI build
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Build CLI binary
        run: |
          if [ -d "openteams-cli" ]; then
            echo "Building openteams-cli for ${{ matrix.cli_target }}..."
            bun run scripts/build-openteams-cli.ts --target ${{ matrix.cli_target }}
            mkdir -p dist
            cp binaries/${{ matrix.cli_build_output }} dist/${{ matrix.cli_binary }}
            if [[ "${{ matrix.name }}" != *"windows"* ]]; then
              chmod +x dist/${{ matrix.cli_binary }}
            fi
            echo "CLI binary built: dist/${{ matrix.cli_binary }}"
          else
            echo "openteams-cli directory not found, skipping CLI build"
          fi

      - name: Create platform package
        if: matrix.name != 'macos-arm64' && matrix.name != 'macos-x64'
        run: |
          mkdir -p npx/openteams-npx/dist/${{ matrix.name }}
          mkdir openteams-${{ matrix.name }}
          mkdir openteams-review-${{ matrix.name }}

          cp dist/openteams-${{ matrix.name }}* openteams-${{ matrix.name }}/${{ matrix.binary }}
          cp dist/openteams-review-${{ matrix.name }}* openteams-review-${{ matrix.name }}/${{ matrix.review_binary }}

          zip -j npx/openteams-npx/dist/${{ matrix.name }}/openteams.zip openteams-${{ matrix.name }}/${{ matrix.binary }}
          zip -j npx/openteams-npx/dist/${{ matrix.name }}/openteams-review.zip openteams-review-${{ matrix.name }}/${{ matrix.review_binary }}

          # Include CLI binary if it was built
          if [ -f "dist/${{ matrix.cli_binary }}" ]; then
            mkdir openteams-cli-${{ matrix.name }}
            cp dist/${{ matrix.cli_binary }} openteams-cli-${{ matrix.name }}/
            zip -j npx/openteams-npx/dist/${{ matrix.name }}/openteams-cli.zip openteams-cli-${{ matrix.name }}/${{ matrix.cli_binary }}
            echo "Packaged CLI binary"
          fi

      - name: Create platform package (macOS)
        if: matrix.name == 'macos-arm64' || matrix.name == 'macos-x64'
        run: |
          mkdir -p npx/openteams-npx/dist/${{ matrix.name }}
          mkdir openteams-${{ matrix.name }}
          cp dist/openteams-${{ matrix.name }}* npx/openteams-npx/dist/${{ matrix.name }}/openteams.zip
          cp dist/openteams-review-${{ matrix.name }}* npx/openteams-npx/dist/${{ matrix.name }}/openteams-review.zip

          # Include CLI binary if it was built
          if [ -f "dist/${{ matrix.cli_binary }}" ]; then
            mkdir openteams-cli-${{ matrix.name }}
            cp dist/${{ matrix.cli_binary }} openteams-cli-${{ matrix.name }}/
            zip -j npx/openteams-npx/dist/${{ matrix.name }}/openteams-cli.zip openteams-cli-${{ matrix.name }}/${{ matrix.cli_binary }}
            echo "Packaged CLI binary"
          fi

      - name: Upload platform package artifact
        uses: actions/upload-artifact@v6
        with:
          name: npx-platform-${{ matrix.name }}
          path: npx/openteams-npx/dist/
          retention-days: 1

  upload-to-r2:
    needs: [bump-version, package-cli]
    runs-on: ubuntu-latest
    outputs:
      r2_enabled: ${{ steps.storage_guard.outputs.enabled }}
      storage_enabled: ${{ steps.storage_guard.outputs.enabled }}
      storage_provider: ${{ steps.storage_guard.outputs.provider }}
      storage_public_url: ${{ steps.storage_guard.outputs.public_url }}
    steps:
      - name: Select binary storage provider (OSS first, then R2)
        id: storage_guard
        shell: bash
        env:
          OSS_BINARIES_ACCESS_KEY_ID: ${{ secrets.OSS_BINARIES_ACCESS_KEY_ID }}
          OSS_BINARIES_SECRET_ACCESS_KEY: ${{ secrets.OSS_BINARIES_SECRET_ACCESS_KEY }}
          OSS_BINARIES_ENDPOINT: ${{ secrets.OSS_BINARIES_ENDPOINT }}
          OSS_BINARIES_BUCKET: ${{ secrets.OSS_BINARIES_BUCKET }}
          OSS_BINARIES_PUBLIC_URL: ${{ secrets.OSS_BINARIES_PUBLIC_URL }}
          R2_BINARIES_ACCESS_KEY_ID: ${{ secrets.R2_BINARIES_ACCESS_KEY_ID }}
          R2_BINARIES_SECRET_ACCESS_KEY: ${{ secrets.R2_BINARIES_SECRET_ACCESS_KEY }}
          R2_BINARIES_ENDPOINT: ${{ secrets.R2_BINARIES_ENDPOINT }}
          R2_BINARIES_BUCKET: ${{ secrets.R2_BINARIES_BUCKET }}
          R2_BINARIES_PUBLIC_URL: ${{ secrets.R2_BINARIES_PUBLIC_URL }}
        run: |
          set -euo pipefail

          oss_ready=1
          for key in OSS_BINARIES_ACCESS_KEY_ID OSS_BINARIES_SECRET_ACCESS_KEY OSS_BINARIES_ENDPOINT OSS_BINARIES_BUCKET OSS_BINARIES_PUBLIC_URL; do
            if [ -z "${!key:-}" ]; then
              oss_ready=0
            fi
          done

          r2_ready=1
          for key in R2_BINARIES_ACCESS_KEY_ID R2_BINARIES_SECRET_ACCESS_KEY R2_BINARIES_ENDPOINT R2_BINARIES_BUCKET R2_BINARIES_PUBLIC_URL; do
            if [ -z "${!key:-}" ]; then
              r2_ready=0
            fi
          done

          if [ "$oss_ready" -eq 1 ]; then
            echo "::notice::Using OSS for binary upload."
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "provider=oss" >> "$GITHUB_OUTPUT"
            echo "public_url=${OSS_BINARIES_PUBLIC_URL%/}" >> "$GITHUB_OUTPUT"
          elif [ "$r2_ready" -eq 1 ]; then
            echo "::notice::Using R2 for binary upload."
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "provider=r2" >> "$GITHUB_OUTPUT"
            echo "public_url=${R2_BINARIES_PUBLIC_URL%/}" >> "$GITHUB_OUTPUT"
          else
            for key in OSS_BINARIES_ACCESS_KEY_ID OSS_BINARIES_SECRET_ACCESS_KEY OSS_BINARIES_ENDPOINT OSS_BINARIES_BUCKET OSS_BINARIES_PUBLIC_URL R2_BINARIES_ACCESS_KEY_ID R2_BINARIES_SECRET_ACCESS_KEY R2_BINARIES_ENDPOINT R2_BINARIES_BUCKET R2_BINARIES_PUBLIC_URL; do
              if [ -z "${!key:-}" ]; then
                echo "::warning::Missing secret: $key"
              fi
            done
            echo "::notice::Skipping binary upload because neither OSS nor R2 is fully configured."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "provider=none" >> "$GITHUB_OUTPUT"
            echo "public_url=" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.storage_guard.outputs.enabled == 'true'
        with:
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Download all platform packages
        if: steps.storage_guard.outputs.enabled == 'true'
        uses: actions/download-artifact@v7
        with:
          pattern: npx-platform-*
          path: binaries/
          merge-multiple: true

      - name: List downloaded binaries
        if: steps.storage_guard.outputs.enabled == 'true'
        run: |
          echo "Downloaded binaries:"
          find binaries/

      - name: Configure AWS CLI for selected storage
        if: steps.storage_guard.outputs.enabled == 'true'
        shell: bash
        env:
          PROVIDER: ${{ steps.storage_guard.outputs.provider }}
          OSS_BINARIES_ACCESS_KEY_ID: ${{ secrets.OSS_BINARIES_ACCESS_KEY_ID }}
          OSS_BINARIES_SECRET_ACCESS_KEY: ${{ secrets.OSS_BINARIES_SECRET_ACCESS_KEY }}
          OSS_BINARIES_REGION: ${{ secrets.OSS_BINARIES_REGION }}
          R2_BINARIES_ACCESS_KEY_ID: ${{ secrets.R2_BINARIES_ACCESS_KEY_ID }}
          R2_BINARIES_SECRET_ACCESS_KEY: ${{ secrets.R2_BINARIES_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail

          if [ "$PROVIDER" = "oss" ]; then
            aws configure set aws_access_key_id "$OSS_BINARIES_ACCESS_KEY_ID"
            aws configure set aws_secret_access_key "$OSS_BINARIES_SECRET_ACCESS_KEY"
            aws configure set default.region "${OSS_BINARIES_REGION:-cn-hangzhou}"
          else
            aws configure set aws_access_key_id "$R2_BINARIES_ACCESS_KEY_ID"
            aws configure set aws_secret_access_key "$R2_BINARIES_SECRET_ACCESS_KEY"
            aws configure set default.region auto
          fi

      - name: Generate manifest and upload binaries
        if: steps.storage_guard.outputs.enabled == 'true'
        shell: bash
        env:
          PROVIDER: ${{ steps.storage_guard.outputs.provider }}
          OSS_BINARIES_ENDPOINT: ${{ secrets.OSS_BINARIES_ENDPOINT }}
          OSS_BINARIES_BUCKET: ${{ secrets.OSS_BINARIES_BUCKET }}
          R2_BINARIES_ENDPOINT: ${{ secrets.R2_BINARIES_ENDPOINT }}
          R2_BINARIES_BUCKET: ${{ secrets.R2_BINARIES_BUCKET }}
        run: |
          set -euo pipefail

          TAG="${{ needs.bump-version.outputs.new_tag }}"
          if [ "$PROVIDER" = "oss" ]; then
            ENDPOINT="$OSS_BINARIES_ENDPOINT"
            BUCKET="$OSS_BINARIES_BUCKET"
          else
            ENDPOINT="$R2_BINARIES_ENDPOINT"
            BUCKET="$R2_BINARIES_BUCKET"
          fi

          # Generate version manifest with checksums
          node -e "
            const fs = require('fs');
            const crypto = require('crypto');
            const manifest = { version: '$TAG', platforms: {} };
            const platforms = ['linux-x64', 'linux-arm64', 'windows-x64', 'macos-x64', 'macos-arm64'];
            const binaries = ['openteams', 'openteams-review', 'openteams-cli'];

            for (const platform of platforms) {
              manifest.platforms[platform] = {};
              for (const binary of binaries) {
                const zipPath = \`binaries/\${platform}/\${binary}.zip\`;
                if (fs.existsSync(zipPath)) {
                  const data = fs.readFileSync(zipPath);
                  manifest.platforms[platform][binary] = {
                    sha256: crypto.createHash('sha256').update(data).digest('hex'),
                    size: data.length
                  };
                }
              }
            }
            fs.writeFileSync('version-manifest.json', JSON.stringify(manifest, null, 2));
            console.log('Generated manifest:');
            console.log(JSON.stringify(manifest, null, 2));
          "

          # Upload binaries (use full tag for path, allows multiple pre-releases to coexist)
          for platform in linux-x64 linux-arm64 windows-x64 macos-x64 macos-arm64; do
            for binary in openteams openteams-review openteams-cli; do
              if [ -f "binaries/$platform/$binary.zip" ]; then
                echo "Uploading binaries/$platform/$binary.zip..."
                aws s3 cp "binaries/$platform/$binary.zip" \
                  "s3://$BUCKET/binaries/$TAG/$platform/$binary.zip" \
                  --endpoint-url "$ENDPOINT"
              fi
            done
          done

          # Upload version manifest
          echo "Uploading version manifest..."
          aws s3 cp version-manifest.json \
            "s3://$BUCKET/binaries/$TAG/manifest.json" \
            --endpoint-url "$ENDPOINT" --content-type "application/json"

          # Update global manifest
          VERSION="${{ needs.bump-version.outputs.new_version }}"
          echo "Updating global manifest..."
          echo "{\"latest\": \"$VERSION\"}" | aws s3 cp - \
            "s3://$BUCKET/binaries/manifest.json" \
            --endpoint-url "$ENDPOINT" --content-type "application/json"

      - name: Verify uploaded binaries
        if: steps.storage_guard.outputs.enabled == 'true'
        shell: bash
        env:
          PROVIDER: ${{ steps.storage_guard.outputs.provider }}
          OSS_BINARIES_ENDPOINT: ${{ secrets.OSS_BINARIES_ENDPOINT }}
          OSS_BINARIES_BUCKET: ${{ secrets.OSS_BINARIES_BUCKET }}
          R2_BINARIES_ENDPOINT: ${{ secrets.R2_BINARIES_ENDPOINT }}
          R2_BINARIES_BUCKET: ${{ secrets.R2_BINARIES_BUCKET }}
        run: |
          set -euo pipefail

          TAG="${{ needs.bump-version.outputs.new_tag }}"
          if [ "$PROVIDER" = "oss" ]; then
            ENDPOINT="$OSS_BINARIES_ENDPOINT"
            BUCKET="$OSS_BINARIES_BUCKET"
          else
            ENDPOINT="$R2_BINARIES_ENDPOINT"
            BUCKET="$R2_BINARIES_BUCKET"
          fi

          echo "Listing uploaded files..."
          aws s3 ls "s3://$BUCKET/binaries/$TAG/" \
            --endpoint-url "$ENDPOINT" \
            --recursive

  build-desktop-installers:
    needs: [bump-version]
    name: Build desktop ${{ matrix.platform }}
    runs-on: ${{ matrix.platform == 'macos' && 'macos-latest' || matrix.platform == 'windows' && 'windows-latest' || 'ubuntu-22.04' }}
    env:
      POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
      POSTHOG_API_ENDPOINT: ${{ secrets.POSTHOG_API_ENDPOINT }}
      VITE_POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
      VITE_POSTHOG_API_ENDPOINT: ${{ secrets.POSTHOG_API_ENDPOINT }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos, windows, linux]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Resolve artifact metadata
        id: artifact_meta
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.platform }}" in
            macos)
              echo "name=desktop-installer-macos" >> "$GITHUB_OUTPUT"
              ;;
            windows)
              echo "name=desktop-installer-windows" >> "$GITHUB_OUTPUT"
              ;;
            linux)
              echo "name=desktop-installer-linux" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unsupported platform: ${{ matrix.platform }}"
              exit 1
              ;;
          esac

      - name: Validate desktop PostHog build secrets
        shell: bash
        run: |
          set -euo pipefail
          for key in POSTHOG_API_KEY POSTHOG_API_ENDPOINT VITE_POSTHOG_API_KEY VITE_POSTHOG_API_ENDPOINT; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing GitHub Secret-backed desktop build env: $key"
              exit 1
            fi
          done

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install WiX Toolset (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          $wixPath = "${env:ProgramFiles(x86)}\WiX Toolset v3.11\bin"
          if (Test-Path $wixPath) {
            $wixPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            squashfs-tools \
            desktop-file-utils \
            file
          if apt-cache show libfuse2 >/dev/null 2>&1; then
            DEBIAN_FRONTEND=noninteractive sudo apt-get install -y libfuse2
          else
            DEBIAN_FRONTEND=noninteractive sudo apt-get install -y libfuse2t64
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Tauri updater signing key
        shell: bash
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${TAURI_PRIVATE_KEY}" ]; then
            echo "::error::Missing secret: TAURI_PRIVATE_KEY"
            exit 1
          fi
          printf '%s' "$TAURI_PRIVATE_KEY" > tauri-updater.key

      - name: Configure GitHub Releases updater
        shell: bash
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          set -euo pipefail
          node scripts/desktop/apply-updater-config.mjs \
            --config src-tauri/tauri.conf.json

      - name: Build desktop bundle (Windows)
        if: matrix.platform == 'windows'
        run: pnpm desktop:build
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Build desktop bundle (macOS with DMG)
        if: matrix.platform == 'macos' && env.ENABLE_MACOS_DMG == 'true'
        run: pnpm desktop:build
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Build desktop bundle (macOS updater only)
        if: matrix.platform == 'macos' && env.ENABLE_MACOS_DMG != 'true'
        run: pnpm tauri build --bundles app,updater
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Build desktop bundle (Linux)
        if: matrix.platform == 'linux'
        # AppImage bundling is intentionally disabled in CI due to recurring
        # appimage.sh failures on GitHub runners.
        run: pnpm tauri build --bundles deb
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          APPIMAGE_EXTRACT_AND_RUN: "1"
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Normalize Linux artifact names
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail

          shopt -s nullglob
          deb_files=(src-tauri/target/release/bundle/deb/*.deb)
          if [ "${#deb_files[@]}" -eq 0 ]; then
            echo "::error::No DEB files found to rename."
            exit 1
          fi

          for file in "${deb_files[@]}"; do
            filename=$(basename "$file")
            stem="${filename%.deb}"
            if [[ "$stem" =~ (^|[-_])linux($|[-_]) ]]; then
              echo "DEB already contains platform name: $filename"
              continue
            fi

            new_path="$(dirname "$file")/${stem}-linux.deb"
            mv "$file" "$new_path"
            echo "Renamed $filename -> $(basename "$new_path")"
          done

      - name: Detect Windows signing configuration
        id: windows_signing
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          $enabled = $true
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PFX_BASE64)) {
            Write-Warning "Missing secret: WINDOWS_CERTIFICATE_PFX_BASE64"
            $enabled = $false
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            Write-Warning "Missing secret: WINDOWS_CERTIFICATE_PASSWORD"
            $enabled = $false
          }

          if (-not $enabled) {
            Write-Host "::notice::Windows signing disabled. Will upload unsigned MSI."
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            exit 0
          }

          $timestampUrl = $env:WINDOWS_TIMESTAMP_URL
          if ([string]::IsNullOrWhiteSpace($timestampUrl)) {
            $timestampUrl = "http://timestamp.digicert.com"
          }

          "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "timestamp_url=$timestampUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Prepare Windows signing certificate
        if: matrix.platform == 'windows' && steps.windows_signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
        run: |
          [System.IO.File]::WriteAllBytes(
            "windows-signing-cert.pfx",
            [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX_BASE64)
          )

      - name: Sign Windows MSI artifacts
        if: matrix.platform == 'windows' && steps.windows_signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_TIMESTAMP_URL: ${{ steps.windows_signing.outputs.timestamp_url }}
        run: |
          $msiFiles = Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter *.msi -File
          if ($msiFiles.Count -eq 0) {
            throw "No MSI files found to sign."
          }

          $signtool = (Get-Command signtool.exe -ErrorAction Stop).Source
          foreach ($file in $msiFiles) {
            & $signtool sign /fd SHA256 /td SHA256 /f "windows-signing-cert.pfx" /p "$env:WINDOWS_CERTIFICATE_PASSWORD" /tr "$env:WINDOWS_TIMESTAMP_URL" "$($file.FullName)"
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to sign MSI: $($file.FullName)"
            }

            & $signtool verify /pa "$($file.FullName)"
            if ($LASTEXITCODE -ne 0) {
              throw "Signature verification failed for MSI: $($file.FullName)"
            }
          }

      - name: Normalize Windows artifact names
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $msiFiles = Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter *.msi -File
          if ($msiFiles.Count -eq 0) {
            throw "No MSI files found to rename."
          }

          foreach ($file in $msiFiles) {
            if ($file.BaseName -match '(?i)(^|[-_])windows($|[-_])') {
              Write-Host "MSI already contains platform name: $($file.Name)"
              continue
            }

            $newName = "$($file.BaseName)-windows$($file.Extension)"
            Rename-Item -LiteralPath $file.FullName -NewName $newName
            Write-Host "Renamed $($file.Name) -> $newName"
          }

      - name: Rebuild Windows updater bundles
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          $msiFiles = Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter *.msi -File
          if ($msiFiles.Count -eq 0) {
            throw "No MSI files found to package for updater."
          }

          $zipBuilderPath = Join-Path $env:RUNNER_TEMP "build-tauri-updater-zip.py"
          @(
            'import os'
            'import struct'
            'import sys'
            'import zipfile'
            ''
            'src, dst = sys.argv[1], sys.argv[2]'
            ''
            "with zipfile.ZipFile(dst, 'w', compression=zipfile.ZIP_STORED, allowZip64=True) as archive:"
            '    archive.write(src, arcname=os.path.basename(src))'
            ''
            "with open(dst, 'rb') as handle:"
            "    if handle.read(4) != b'PK\x03\x04':"
            "        raise SystemExit(f'Unexpected ZIP header for {dst}')"
            ''
            '    version, flags, method, mtime, mdate, crc, csize, usize, name_len, extra_len = struct.unpack('
            "        '<HHHHHIIIHH',"
            '        handle.read(26),'
            '    )'
            ''
            '    if method != 0:'
            '        raise SystemExit('
            "            f'Windows updater bundle must use ZIP_STORED compression, got method {method} for {dst}'"
            '        )'
          ) | Set-Content -Path $zipBuilderPath -Encoding UTF8

          foreach ($file in $msiFiles) {
            $zipPath = "$($file.FullName).zip"
            Remove-Item -Path $zipPath, "$zipPath.sig" -Force -ErrorAction SilentlyContinue
            python $zipBuilderPath "$($file.FullName)" "$zipPath"

            if ([string]::IsNullOrWhiteSpace($env:TAURI_KEY_PASSWORD)) {
              pnpm tauri signer sign -f "tauri-updater.key" "$zipPath"
            } else {
              pnpm tauri signer sign -f "tauri-updater.key" -p "$env:TAURI_KEY_PASSWORD" "$zipPath"
            }

            if ($LASTEXITCODE -ne 0) {
              throw "Failed to sign updater bundle: $zipPath"
            }
          }

          Remove-Item -Path $zipBuilderPath -Force

      - name: Detect macOS signing configuration
        id: macos_signing
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APP_STORE_API_KEY: ${{ secrets.APP_STORE_API_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for key in APPLE_CERTIFICATE_P12_BASE64 APPLE_CERTIFICATE_PASSWORD APP_STORE_API_KEY; do
            if [ -z "${!key}" ]; then
              echo "::warning::Missing secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "::notice::Apple signing/notarization disabled. Will upload unsigned macOS updater artifacts."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve macOS bundle path
        id: macos_bundle
        if: runner.os == 'macOS' && steps.macos_signing.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          app_path=$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' | head -n 1 || true)
          if [ -z "$app_path" ]; then
            echo "::error::No .app bundle found under src-tauri/target/release/bundle/macos"
            exit 1
          fi
          mkdir -p signed
          echo "app_path=$app_path" >> "$GITHUB_OUTPUT"

      - name: Prepare Apple certificate and API key
        if: runner.os == 'macOS' && steps.macos_signing.outputs.enabled == 'true'
        shell: bash
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APP_STORE_API_KEY: ${{ secrets.APP_STORE_API_KEY }}
        run: |
          set -euo pipefail
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > certificate.p12
          printf '%s' "$APP_STORE_API_KEY" > app_store_key.json

      - name: Sign macOS app bundle
        if: runner.os == 'macOS' && steps.macos_signing.outputs.enabled == 'true'
        uses: BloopAI/apple-code-sign-action@v1
        with:
          input_path: ${{ steps.macos_bundle.outputs.app_path }}
          output_path: signed/openteams.app
          p12_file: certificate.p12
          p12_password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          sign: true
          sign_args: "--code-signature-flags=runtime"

      - name: Create signed DMG from signed app
        id: signed_dmg
        if: runner.os == 'macOS' && steps.macos_signing.outputs.enabled == 'true' && env.ENABLE_MACOS_DMG == 'true'
        shell: bash
        run: |
          set -euo pipefail
          signed_dmg='src-tauri/target/release/bundle/dmg/openteams-signed.dmg'
          rm -f "$signed_dmg"
          hdiutil create -volname 'openteams' -srcfolder 'signed/openteams.app' -ov -format UDZO "$signed_dmg"
          echo "signed_dmg=$signed_dmg" >> "$GITHUB_OUTPUT"

      - name: Notarize signed DMG (macOS)
        if: runner.os == 'macOS' && steps.macos_signing.outputs.enabled == 'true' && env.ENABLE_MACOS_DMG == 'true'
        uses: BloopAI/apple-code-sign-action@main
        with:
          input_path: ${{ steps.signed_dmg.outputs.signed_dmg }}
          sign: false
          notarize: true
          app_store_connect_api_key_json_file: app_store_key.json

      - name: Staple notarization ticket to DMG
        if: runner.os == 'macOS' && steps.macos_signing.outputs.enabled == 'true' && env.ENABLE_MACOS_DMG == 'true'
        shell: bash
        run: |
          set -euo pipefail
          xcrun stapler staple '${{ steps.signed_dmg.outputs.signed_dmg }}'

      - name: Build signed macOS updater bundle
        if: runner.os == 'macOS' && steps.macos_signing.outputs.enabled == 'true'
        id: signed_macos_updater
        shell: bash
        env:
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          case "${{ runner.arch }}" in
            ARM64) updater_arch="aarch64" ;;
            X64) updater_arch="x86_64" ;;
            *)
              echo "::error::Unsupported macOS runner architecture: ${{ runner.arch }}"
              exit 1
              ;;
          esac

          updater_bundle="src-tauri/target/release/bundle/macos/openteams-${{ needs.bump-version.outputs.new_tag }}-${updater_arch}.app.tar.gz"
          rm -f "$updater_bundle" "$updater_bundle.sig"
          tar -czf "$updater_bundle" -C signed openteams.app

          if [ -n "${TAURI_KEY_PASSWORD:-}" ]; then
            pnpm tauri signer sign -f tauri-updater.key -p "$TAURI_KEY_PASSWORD" "$updater_bundle"
          else
            pnpm tauri signer sign -f tauri-updater.key "$updater_bundle"
          fi

          echo "bundle=$updater_bundle" >> "$GITHUB_OUTPUT"

      - name: Upload signed desktop installer artifact (macOS)
        if: matrix.platform == 'macos' && steps.macos_signing.outputs.enabled == 'true' && env.ENABLE_MACOS_DMG == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.artifact_meta.outputs.name }}
          path: |
            ${{ steps.signed_dmg.outputs.signed_dmg }}
            ${{ steps.signed_macos_updater.outputs.bundle }}
            ${{ steps.signed_macos_updater.outputs.bundle }}.sig
          if-no-files-found: error
          retention-days: 1

      - name: Upload signed desktop updater artifacts (macOS)
        if: matrix.platform == 'macos' && steps.macos_signing.outputs.enabled == 'true' && env.ENABLE_MACOS_DMG != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.artifact_meta.outputs.name }}
          path: |
            ${{ steps.signed_macos_updater.outputs.bundle }}
            ${{ steps.signed_macos_updater.outputs.bundle }}.sig
          if-no-files-found: error
          retention-days: 1

      - name: Upload desktop artifacts (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.artifact_meta.outputs.name }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.zip
            src-tauri/target/release/bundle/msi/*.msi.zip.sig
          if-no-files-found: error
          retention-days: 1

      - name: Upload desktop artifacts (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.artifact_meta.outputs.name }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error
          retention-days: 1

      - name: Upload desktop artifacts (macOS unsigned)
        if: matrix.platform == 'macos' && steps.macos_signing.outputs.enabled != 'true' && env.ENABLE_MACOS_DMG == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.artifact_meta.outputs.name }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error
          retention-days: 1

      - name: Upload desktop updater artifacts (macOS unsigned)
        if: matrix.platform == 'macos' && steps.macos_signing.outputs.enabled != 'true' && env.ENABLE_MACOS_DMG != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.artifact_meta.outputs.name }}
          path: |
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error
          retention-days: 1

      - name: Prepare desktop package bundle
        id: package_bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p gh-package/files

          if [[ "${{ matrix.platform }}" == "macos" && "${{ steps.macos_signing.outputs.enabled }}" == "true" && "${ENABLE_MACOS_DMG}" == "true" ]]; then
            cp src-tauri/target/release/bundle/dmg/openteams-signed.dmg gh-package/files/
          elif [[ "${{ matrix.platform }}" == "macos" && "${{ steps.macos_signing.outputs.enabled }}" == "true" ]]; then
            cp "${{ steps.signed_macos_updater.outputs.bundle }}" gh-package/files/
          elif [[ "${{ matrix.platform }}" == "linux" ]]; then
            cp src-tauri/target/release/bundle/deb/*.deb gh-package/files/
          elif [[ "${{ matrix.platform }}" == "windows" ]]; then
            cp src-tauri/target/release/bundle/msi/*.msi gh-package/files/
          else
            cp src-tauri/target/release/bundle/macos/*.app.tar.gz gh-package/files/
          fi

          if ! compgen -G "gh-package/files/*" > /dev/null; then
            echo "::error::No desktop files found to package for ${{ matrix.platform }}"
            exit 1
          fi

          bundle_name="openteams-desktop-${{ matrix.platform }}-${{ github.sha }}.tar.gz"
          (cd gh-package/files && tar -czf "../${bundle_name}" .)
          (cd gh-package && sha256sum "${bundle_name}" > "${bundle_name}.sha256")

          echo "bundle_name=${bundle_name}" >> "$GITHUB_OUTPUT"

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "$GHCR_TOKEN" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push desktop bundle to GitHub Packages (GHCR)
        shell: bash
        run: |
          set -euo pipefail
          owner_lc="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          repo_lc="$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')"
          package_tag="${{ github.sha }}-${{ github.run_number }}-${{ github.run_attempt }}"
          package_ref="ghcr.io/${owner_lc}/${repo_lc}/desktop-${{ matrix.platform }}:${package_tag}"

          cd gh-package
          echo "Pushing package: ${package_ref}"
          oras push "$package_ref" \
            --artifact-type application/vnd.openteams.desktop.bundle.v1+tar \
            --annotation "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --annotation "org.opencontainers.image.revision=${{ github.sha }}" \
            "${{ steps.package_bundle.outputs.bundle_name }}:application/gzip" \
            "${{ steps.package_bundle.outputs.bundle_name }}.sha256:text/plain"

      - name: Clean up signing files (macOS)
        if: matrix.platform == 'macos' && always()
        shell: bash
        run: |
          rm -f certificate.p12 app_store_key.json

      - name: Clean up signing files (Windows)
        if: matrix.platform == 'windows' && always()
        shell: pwsh
        run: |
          Remove-Item -Path "windows-signing-cert.pfx" -Force -ErrorAction SilentlyContinue

      - name: Clean up updater signing key
        if: always()
        shell: bash
        run: rm -f tauri-updater.key

  create-prerelease:
    needs: [bump-version, build-frontend, build-desktop-installers, upload-to-r2]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Download frontend artifact
        uses: actions/download-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Download desktop installer artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: desktop-installer-*
          path: release-assets/desktop/
          merge-multiple: true

      - name: List downloaded artifacts
        run: |
          echo "Frontend dist:"
          find frontend/dist
          echo "Desktop installers:"
          find release-assets/desktop

      - name: Zip frontend
        run: |
          mkdir openteams-${{ needs.bump-version.outputs.new_tag }}
          mv frontend/dist openteams-${{ needs.bump-version.outputs.new_tag }}
          zip -r openteams-${{ needs.bump-version.outputs.new_tag }}.zip openteams-${{ needs.bump-version.outputs.new_tag }}

      - name: Setup Node for npm pack
        uses: ./.github/actions/setup-node

      - name: Generate desktop updater manifest
        run: |
          node scripts/desktop/generate-github-updater-json.mjs \
            --input-dir release-assets/desktop \
            --output release-assets/desktop/latest.json \
            --owner openteams-lab \
            --repo openteams \
            --tag ${{ needs.bump-version.outputs.new_tag }} \
            --version ${{ needs.bump-version.outputs.new_tag }}

      - name: Resolve storage public URL
        shell: bash
        env:
          STORAGE_PROVIDER: ${{ needs.upload-to-r2.outputs.storage_provider }}
          STORAGE_PUBLIC_URL_FROM_OUTPUT: ${{ needs.upload-to-r2.outputs.storage_public_url }}
          OSS_BINARIES_PUBLIC_URL: ${{ secrets.OSS_BINARIES_PUBLIC_URL }}
          R2_BINARIES_PUBLIC_URL: ${{ secrets.R2_BINARIES_PUBLIC_URL }}
        run: |
          set -euo pipefail

          resolved_url="${STORAGE_PUBLIC_URL_FROM_OUTPUT:-}"
          if [ -z "${resolved_url}" ]; then
            if [ "${STORAGE_PROVIDER}" = "oss" ]; then
              resolved_url="${OSS_BINARIES_PUBLIC_URL:-}"
            elif [ "${STORAGE_PROVIDER}" = "r2" ]; then
              resolved_url="${R2_BINARIES_PUBLIC_URL:-}"
            fi
          fi

          resolved_url="${resolved_url%/}"
          echo "STORAGE_PUBLIC_URL_RESOLVED=${resolved_url}" >> "$GITHUB_ENV"

          if [ -n "${resolved_url}" ]; then
            echo "::notice::Resolved storage public URL for provider '${STORAGE_PROVIDER}'."
          else
            echo "::warning::Storage public URL is empty for provider '${STORAGE_PROVIDER}'."
          fi

      - name: Validate npm publish prerequisites
        if: ${{ github.event.inputs.publish_to_npm == 'true' }}
        shell: bash
        env:
          STORAGE_UPLOAD_ENABLED: ${{ needs.upload-to-r2.outputs.storage_enabled }}
          STORAGE_PROVIDER: ${{ needs.upload-to-r2.outputs.storage_provider }}
          STORAGE_PUBLIC_URL: ${{ env.STORAGE_PUBLIC_URL_RESOLVED }}
        run: |
          set -euo pipefail
          if [ "${STORAGE_UPLOAD_ENABLED}" != "true" ]; then
            echo "::error::publish_to_npm=true requires binary upload job to run successfully."
            echo "::error::Both OSS and R2 appear unavailable or skipped."
            exit 1
          fi

          if [ "${STORAGE_PROVIDER}" = "none" ] || [ -z "${STORAGE_PROVIDER:-}" ]; then
            echo "::error::publish_to_npm=true requires an active storage provider (oss or r2)."
            exit 1
          fi

          if [ -z "${STORAGE_PUBLIC_URL:-}" ]; then
            echo "::error::publish_to_npm=true requires a public download URL (OSS_BINARIES_PUBLIC_URL or R2_BINARIES_PUBLIC_URL)."
            exit 1
          fi

      - name: Verify binaries are publicly downloadable
        if: ${{ github.event.inputs.publish_to_npm == 'true' }}
        shell: bash
        env:
          STORAGE_PROVIDER: ${{ needs.upload-to-r2.outputs.storage_provider }}
          STORAGE_PUBLIC_URL: ${{ env.STORAGE_PUBLIC_URL_RESOLVED }}
          TAG: ${{ needs.bump-version.outputs.new_tag }}
        run: |
          set -euo pipefail

          BASE="${STORAGE_PUBLIC_URL%/}"
          MANIFEST_URL="$BASE/binaries/$TAG/manifest.json"
          echo "Checking manifest ($STORAGE_PROVIDER): $MANIFEST_URL"
          curl -fsSL "$MANIFEST_URL" -o manifest.json

          # Ensure required platform/binary entries exist and each file is reachable.
          node -e '
            const fs = require("fs");
            const manifest = JSON.parse(fs.readFileSync("manifest.json", "utf8"));
            const requiredPlatforms = ["linux-x64", "linux-arm64", "windows-x64", "macos-x64", "macos-arm64"];
            const requiredBinaries = ["openteams", "openteams-review"];
            // CLI is optional for now during transition
            const optionalBinaries = ["openteams-cli"];

            for (const platform of requiredPlatforms) {
              if (!manifest.platforms?.[platform]) {
                console.error(`Missing platform in manifest: ${platform}`);
                process.exit(1);
              }
              for (const binary of requiredBinaries) {
                if (!manifest.platforms[platform][binary]) {
                  console.error(`Missing binary in manifest: ${platform}/${binary}`);
                  process.exit(1);
                }
              }
            }
          '

          for platform in linux-x64 linux-arm64 windows-x64 macos-x64 macos-arm64; do
            for binary in openteams openteams-review; do
              url="$BASE/binaries/$TAG/$platform/$binary.zip"
              echo "Checking $url"
              curl -fsI "$url" >/dev/null
            done
          done

      - name: Prepare NPX package and pack
        shell: bash
        env:
          STORAGE_PROVIDER: ${{ needs.upload-to-r2.outputs.storage_provider }}
          STORAGE_PUBLIC_URL: ${{ env.STORAGE_PUBLIC_URL_RESOLVED }}
        run: |
          set -euo pipefail
          cd npx/openteams-npx
          if [ -f bin/download.js ]; then
            if [ -n "${STORAGE_PUBLIC_URL:-}" ] && [ "${STORAGE_PROVIDER}" = "oss" ]; then
              echo "Injecting OSS URL into bin/download.js"
              sed -i "s|__OSS_PUBLIC_URL__|${STORAGE_PUBLIC_URL}|g" bin/download.js
            elif [ -n "${STORAGE_PUBLIC_URL:-}" ] && [ "${STORAGE_PROVIDER}" = "r2" ]; then
              echo "Injecting R2 URL into bin/download.js"
              sed -i "s|__R2_PUBLIC_URL__|${STORAGE_PUBLIC_URL}|g" bin/download.js
            else
              echo "Storage public URL is empty or provider unavailable; skipping URL injection"
            fi
            sed -i "s|__BINARY_TAG__|${{ needs.bump-version.outputs.new_tag }}|g" bin/download.js
          else
            echo "bin/download.js not found; skipping URL/tag injection"
          fi

          node -e '
            const d = require("./bin/download.js");
            const source = d.resolveRemoteSource();
            if (!source) {
              throw new Error("download.js URL injection verification failed: resolveRemoteSource() is null");
            }
            if (/^__[A-Z0-9_]+__$/.test(String(d.BINARY_TAG || "").trim())) {
              throw new Error("download.js tag injection verification failed: BINARY_TAG is still unresolved");
            }
            console.log(`Verified download source: ${source.provider} ${source.baseUrl}`);
            console.log(`Verified binary tag: ${d.BINARY_TAG}`);
          '
          npm pack

      - name: Pack alias NPX package
        shell: bash
        run: |
          set -euo pipefail
          cd npx/openteams-web-npx
          # Update dependency version to match the main package version
          node -e "
            const fs = require('fs');
            const mainPkg = require('../openteams-npx/package.json');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = mainPkg.version;
            pkg.dependencies['@openteams-lab/openteams-web'] = '^' + mainPkg.version;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npm pack

      - name: Prepare openteams-cli NPX package
        shell: bash
        env:
          STORAGE_PROVIDER: ${{ needs.upload-to-r2.outputs.storage_provider }}
          STORAGE_PUBLIC_URL: ${{ env.STORAGE_PUBLIC_URL_RESOLVED }}
        run: |
          set -euo pipefail
          cd npx/openteams-cli-npx
          
          # Update version to match
          VERSION="${{ needs.bump-version.outputs.new_version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          
          if [ -f bin/download.js ]; then
            if [ -n "${STORAGE_PUBLIC_URL:-}" ] && [ "${STORAGE_PROVIDER}" = "oss" ]; then
              echo "Injecting OSS URL into bin/download.js"
              sed -i "s|__OSS_PUBLIC_URL__|${STORAGE_PUBLIC_URL}|g" bin/download.js
            elif [ -n "${STORAGE_PUBLIC_URL:-}" ] && [ "${STORAGE_PROVIDER}" = "r2" ]; then
              echo "Injecting R2 URL into bin/download.js"
              sed -i "s|__R2_PUBLIC_URL__|${STORAGE_PUBLIC_URL}|g" bin/download.js
            else
              echo "Storage public URL is empty or provider unavailable; skipping URL injection"
            fi
            sed -i "s|__BINARY_TAG__|${{ needs.bump-version.outputs.new_tag }}|g" bin/download.js
          else
            echo "bin/download.js not found; skipping URL/tag injection"
          fi
          
          npm pack

      - name: Publish NPX packages to npm
        id: npm_publish
        if: ${{ github.event.inputs.publish_to_npm == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::Missing NPM_TOKEN secret"
            exit 1
          fi

          VERSION="${{ needs.bump-version.outputs.new_version }}"
          
          # For no-update-version, check if version already exists in npm
          if [[ "${{ github.event.inputs.version_type }}" == "no-update-version" ]]; then
            existing_version=$(npm view @openteams-lab/openteams-web version 2>/dev/null || echo "")
            if [[ "$existing_version" == "$VERSION" ]]; then
              echo "::warning::Version $VERSION already exists on npm. Skipping publish (no-update-version mode)."
              echo "skipped=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # Publish main package (@openteams-lab/openteams-web)
          cd npx/openteams-npx
          tarball=$(ls -1t openteams-*.tgz 2>/dev/null | head -n 1)
          if [ -z "${tarball:-}" ]; then
            echo "::error::No npm tarball found in npx/openteams-npx"
            exit 1
          fi
          echo "Publishing main package: $tarball"
          npm publish "$tarball" --access public
          cd ../..

          # Wait for npm registry to propagate the main package
          echo "Waiting for npm registry propagation..."
          sleep 10

          # Publish alias package (openteams-web)
          cd npx/openteams-web-npx
          tarball_alias=$(ls -1t openteams-web-*.tgz 2>/dev/null | head -n 1)
          if [ -z "${tarball_alias:-}" ]; then
            echo "::error::No npm tarball found in npx/openteams-web-npx"
            exit 1
          fi
          echo "Publishing alias package: $tarball_alias"
          npm publish "$tarball_alias" --access public
          cd ../..

          # Publish openteams-cli package
          if [ -d "npx/openteams-cli-npx" ]; then
            cd npx/openteams-cli-npx
            tarball_cli=$(ls -1t openteams-cli-*.tgz 2>/dev/null | head -n 1)
            if [ -n "${tarball_cli:-}" ]; then
              echo "Publishing CLI package: $tarball_cli"
              npm publish "$tarball_cli" --access public
            else
              echo "::warning::No npm tarball found in npx/openteams-cli-npx"
            fi
            cd ../..
          fi

      - name: Generate simple changelog summary
        id: changelog
        uses: actions/github-script@v7
        env:
          NPM_PUBLISHED: ${{ github.event.inputs.publish_to_npm == 'true' && steps.npm_publish.outcome == 'success' && steps.npm_publish.outputs.skipped != 'true' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const currentTag = '${{ needs.bump-version.outputs.new_tag }}';
            const npmPublished = process.env.NPM_PUBLISHED === 'true';

            const tags = await github.paginate(github.rest.repos.listTags, {
              owner,
              repo,
              per_page: 100,
            });
            const releaseTags = tags
              .map((tag) => tag.name)
              .filter((name) => name.startsWith('v'));
            const currentTagIndex = releaseTags.indexOf(currentTag);

            let previousTag = null;
            if (currentTagIndex >= 0) {
              previousTag = releaseTags[currentTagIndex + 1] ?? null;
            } else {
              previousTag =
                releaseTags.find((tagName) => tagName !== currentTag) ?? null;
            }

            const contributors = new Set();
            const pullRequests = new Map();
            const prNumbersFromMessages = new Set();

            if (previousTag) {
              const { data: compare } =
                await github.rest.repos.compareCommitsWithBasehead({
                  owner,
                  repo,
                  basehead: `${previousTag}...${currentTag}`,
                });

              for (const commit of compare.commits ?? []) {
                const message = commit.commit?.message ?? '';
                for (const match of message.matchAll(/#(\\d+)/g)) {
                  prNumbersFromMessages.add(Number(match[1]));
                }
                if (commit.author?.login) {
                  contributors.add(`@${commit.author.login}`);
                }
                if (commit.committer?.login) {
                  contributors.add(`@${commit.committer.login}`);
                }

                // Prefer GitHub's commit<->PR association API because commit
                // messages often do not contain PR numbers.
                try {
                  const { data: associatedPrs } =
                    await github.rest.repos.listPullRequestsAssociatedWithCommit({
                      owner,
                      repo,
                      commit_sha: commit.sha,
                      per_page: 100,
                    });
                  for (const pr of associatedPrs ?? []) {
                    if (!pr?.number || !pr.merged_at) continue;
                    pullRequests.set(pr.number, pr);
                    if (pr.user?.login) {
                      contributors.add(`@${pr.user.login}`);
                    }
                  }
                } catch (_error) {
                  // Ignore API lookup errors; commit-message extraction fallback runs below.
                }
              }

              // Fallback for repositories where commit association API misses some PRs.
              for (const number of prNumbersFromMessages) {
                if (pullRequests.has(number)) continue;
                try {
                  const { data: pr } = await github.rest.pulls.get({
                    owner,
                    repo,
                    pull_number: number,
                  });
                  if (!pr.merged_at) continue;
                  pullRequests.set(pr.number, pr);
                  if (pr.user?.login) {
                    contributors.add(`@${pr.user.login}`);
                  }
                } catch (_error) {
                  // Ignore non-PR numbers from commit messages.
                }
              }
            }

            const lines = ["## What's Changed"];
            if (pullRequests.size > 0) {
              for (const pr of [...pullRequests.values()].sort((a, b) => a.number - b.number)) {
                lines.push(`- ${pr.title} by @${pr.user?.login ?? 'unknown'} in #${pr.number}`);
              }
            } else {
              lines.push('- No pull requests found in this release range.');
            }

            lines.push('');
            if (previousTag) {
              lines.push(`Full Changelog: https://github.com/${owner}/${repo}/compare/${previousTag}...${currentTag}`);
            } else {
              lines.push(`Full Changelog: Initial release (${currentTag})`);
            }

            lines.push('', '## Contributors');
            const sortedContributors = [...contributors].sort((a, b) => a.localeCompare(b));
            if (sortedContributors.length > 0) {
              for (const contributor of sortedContributors) {
                lines.push(`- ${contributor}`);
              }
            } else {
              lines.push('- None');
            }

            if (npmPublished) {
              lines.push('', '✅ Published to npm registry');
            }

            const body = lines.join('\n');
            core.setOutput('body', body);
            await core.summary
              .addHeading('Release Changelog Preview')
              .addCodeBlock(body, 'markdown')
              .write();

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version.outputs.new_tag }}
          name: ${{ github.event.inputs.version_type == 'prerelease' && format('Pre-release {0}', needs.bump-version.outputs.new_tag) || github.event.inputs.version_type == 'no-update-version' && format('Build {0}', needs.bump-version.outputs.new_tag) || format('Release {0}', needs.bump-version.outputs.new_tag) }}
          prerelease: ${{ github.event.inputs.version_type == 'prerelease' || github.event.inputs.version_type == 'no-update-version' }}
          generate_release_notes: false
          body: ${{ steps.changelog.outputs.body }}
          files: |
            openteams-${{ needs.bump-version.outputs.new_tag }}.zip
            npx/openteams-npx/openteams-*.tgz
            npx/openteams-web-npx/openteams-web-*.tgz
            npx/openteams-cli-npx/openteams-cli-*.tgz
            release-assets/desktop/**/*.msi
            release-assets/desktop/**/*.dmg
            release-assets/desktop/**/*.deb
            release-assets/desktop/**/*.msi.zip
            release-assets/desktop/**/*.app.tar.gz
            release-assets/desktop/**/*.sig
            release-assets/desktop/latest.json
